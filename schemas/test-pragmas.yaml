$schema: "https://json-schema.org/draft/2020-12/schema"
type: object

description: >
  Top-level map keyed by pragma name.
  Produced by LML.Input.Pragmas.From_Pragmas.

  Only the positional two-argument pragma form is supported:

    pragma <PragmaName> (<Key>, <Value>);

  Named-argument syntax (=>), compound expressions, and nested
  structures are silently discarded by the parser.

properties:
  Alire_Test:
    description: Keys and values from pragma Alire_Test (...) occurrences.
    type: object
    properties:
      Auxiliary_File:
        description: >
          When True (or omitted, which is equivalent to True), the file is a
          support unit and must not be turned into a test main.
          Mutually exclusive with all other keys.
        type: boolean
        default: true
        examples:
          - true
      Name:
        description: Human-readable test name.
        type: string
        examples:
          - "A test"
      Should_Fail:
        description: >
          Whether the test is expected to fail. Omitting the value is
          equivalent to True.
        type: boolean
        default: true
        examples:
          - true
      Timeout:
        description: Maximum duration for the test, in seconds.
        type: number
        examples:
          - 11.1
    additionalProperties: false
    if:
      properties:
        Auxiliary_File:
          const: true
      required: [Auxiliary_File]
    then:
      maxProperties: 1

additionalProperties: false

examples:
  - Alire_Test:
      Auxiliary_File: true
  - Alire_Test:
      Name: "A test"
      Should_Fail: true
      Timeout: 11.1
