# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
#
# JSON Schema (authored in YAML, Draft 2020-12) for Alire manifests.
#
# Validates both index manifests (`<name>-<version>.toml`) and local
# manifests (`alire.toml`). It is intentionally *lenient* about the
# index-vs-local differences: only the common-subset required fields are
# enforced, so a local manifest without `origin`/`version` still passes.
#
# The format is specified in doc/catalog-format-spec.md; keep both in sync.
#
# How to validate (the schema is YAML; most tools want JSON — convert with
# e.g. `yq -o=json` or `python -c 'import yaml,json,sys;
# json.dump(yaml.safe_load(open(sys.argv[1])), sys.stdout)'`):
#
#   taplo lint --schema=manifest-schema.json path/to/alire.toml
#   check-jsonschema --schemafile manifest-schema.json path/to/manifest.toml
#
# NOTE: this schema relies on `$ref`/`$defs` and `patternProperties`, which
# are needed to express the recursive `'case(...)'` dynamic expressions.

"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "https://raw.githubusercontent.com/alire-project/alire/master/schemas/manifest-schema.yaml"
title: Alire crate release manifest
description: >-
  A single Alire release manifest, or a file of external definitions. See
  doc/catalog-format-spec.md for the authoritative specification.

type: object
additionalProperties: false

# Required for both index and local manifests. `version` is mandatory too
# (enforced below) for every release; only external-only definition files
# (which carry `[[external]]` and no release version) may omit it. Index-only
# extras (maintainers, origin) are not enforced here, on purpose.
required:
  - name
  - description

# `version` is mandatory unless this is an external-only definition file.
allOf:
  - if:
      not:
        required: [external]
    then:
      required: [version]

properties:

  # --- Static identification -------------------------------------------
  name:
    "$ref": "#/$defs/crate-name"
    description: >-
      Name of the crate this release belongs to. See `alr help identifiers`
      for the naming rules.
  version:
    type: string  # TODO: refine into a semver pattern
    description: Semantic version of the release.
  description:
    type: string  # TODO: refine with bounds
    description: One-line description of the crate.
  long-description:
    type: string
    description: Long, possibly multi-line description of the crate.
  notes:
    type: string
    description: Notes about this release
  website:
    type: string  # TODO: refine as URL
    description: URL of the project's website or repository.
  auto-gpr-with:
    type: boolean
    default: true
    description: >-
      Whether to automatically add "with" clauses to the GPR configuration file
      generated by Alire. If set to false, the user will need to add the
      appropriate clauses manually to find the sources of the crate.

  authors:
    "$ref": "#/$defs/string-array"
    description: >-
      Array of human-readable names of the people who wrote the packaged
      software.
  maintainers:
    "$ref": "#/$defs/string-array"
    description: >-
      Array of human-readable names (optional) with a contact email (mandatory)
      of the people who maintain the crate metadata in Alire. Mandatory for
      indexing.
  maintainers-logins:
    type: array
    items:
      type: string
      minLength: 1
    description: >-
      Array of GitHub login usernames authorized to modify the crate. Mandatory
      for crates submitted to the community index.
  licenses:
    type: string  # TODO: look for a SPDX scheme
    description: >-
      Valid SPDX license expression (not fully validated here). Mandatory for
      indexing.
  tags:
    "$ref": "#/$defs/string-array"
    description: >-
      Flat list of topics covered by the crate, to help users find related
      crates.

  # --- Dynamic scalar / list properties --------------------------------
  available:
    "$ref": "#/$defs/dyn-bool"
    default: true
    description: >-
      Whether the crate is available. Defaults to true; a dynamic boolean
      expression may restrict availability.
  executables:
    "$ref": "#/$defs/dyn-strlist"
    description: >-
      Simple names of the executables built by the crate (no paths). If
      only one is given, it is the default for `alr run`.
  project-files:
    "$ref": "#/$defs/dyn-strlist"
    description: >-
      Paths, relative to the source root, to the `.gpr` project files made
      available by the crate. If omitted, Alire presumes <crate>.gpr.

  # --- Dependencies and relations --------------------------------------
  depends-on:
    "$ref": "#/$defs/deps-or-array"
    description: >-
      Dependencies of this release, as crate/version-constraint pairs.
      Accepts dynamic expressions.
  forbids:
    "$ref": "#/$defs/deps-or-array"
    description: >-
      Dependencies prevented from appearing in a solution together with this
      release.
  provides:
    type: array
    items:
      type: string  # TODO: reuse the crate-name definition
    description: >-
      Releases of other crates for which this release is a drop-in replacement
      (e.g. `crate=1.1`).
  pins:
    type: array
    items:
      "$ref": "#/$defs/pin-table"
    description: >-
      Work-in-progress dependency overrides, used locally to fulfill
      dependencies with a specific version, local path, or git repository.

  # --- GPR integration --------------------------------------------------
  gpr-externals:
    type: object
    additionalProperties:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
    description: >-
      Mapping from GPR external variable names to their set of possible values
      (array of strings), or an empty string when the set is unbounded.
  gpr-set-externals:
    "$ref": "#/$defs/dyn-string-map"
    description: >-
      Values to set for GPR external variables when building. Default values
      belong in the .gpr file, not here. Accepts dynamic expressions.

  # --- Environment / actions / test ------------------------------------
  environment:
    "$ref": "#/$defs/dyn-environment"
    description: >-
      Environment variable modifications applied at build time, as
      VARIABLE.<append|prepend|set> = value. Accepts dynamic expressions.
  actions:
    "$ref": "#/$defs/action-node"
    description: >-
      Commands to run when certain workspace events occur (post-fetch,
      pre-build, post-build). Accepts dynamic expressions.
  test:
    "$ref": "#/$defs/test-node"
    description: >-
      Configuration for `alr test`: a built-in runner or an external command,
      with optional id, directory and jobs.

  # --- Origin -----------------------------------------------------------
  # `origin` is always a table (url/hashes/commit/... live inside it), and
  # may contain `case(...)` selectors for binary origins.
  origin:
    "$ref": "#/$defs/dyn-origin"
    description: >-
      How the release's sources are obtained. Mandatory for index manifests,
      forbidden in workspace manifests. Accepts dynamic expressions for binary
      origins.

  # --- Configuration ----------------------------------------------------
  configuration:
    "$ref": "#/$defs/configuration"
    description: >-
      Controls the crate configuration code generators and defines or sets
      configuration variables.

  # --- Build profiles / switches ---------------------------------------
  build-profiles:
    type: object
    additionalProperties:
      "$ref": "#/$defs/build-profile"
    description: >-
      Build profile (development, release, validation) to use for each crate
      in the solution; `*` sets the default for unlisted crates.
  build-switches:
    type: object
    propertyNames:
      "$ref": "#/$defs/profile-or-wildcard"
    additionalProperties:
      "$ref": "#/$defs/build-switch-profile"
    description: >-
      Per-profile customization of compiler switches, keyed by build profile
      or the `*` wildcard.

  # --- External definitions --------------------------------------------
  external:
    type: array
    items:
      "$ref": "#/$defs/external"
    description: >-
      External release definitions (not built from sources; version detected
      at run time).

"$defs":

  # =====================================================================
  # Dynamic-expression machinery
  #
  # A "dynamic" value may carry one or more `'case(var)'` selectors between
  # the property key and its value, nested arbitrarily. We model this as a
  # recursive type: a value is either the static value, or a `case` wrapper
  # whose branches are again dynamic values.
  # =====================================================================

  # Pattern matching a `case(var)` key for any supported environment var.
  # (Used inside patternProperties below; repeated literally because JSON
  # Schema patternProperties keys cannot themselves be $ref'd.)

  case-label:
    description: >-
      A case branch label: a single platform value, an alternation `a|b`
      (whitespace around values and `|` is allowed), or the catch-all `...`.
    type: string
    pattern: '^(\.\.\.|[A-Za-z0-9._+ -]+(\|[A-Za-z0-9._+ -]+)*)$'

  # Atomic dynamic boolean: a bool, or a pure case wrapper of dyn-bools.
  dyn-bool:
    oneOf:
      - type: boolean
      - "$ref": "#/$defs/case-of-bool"
  case-of-bool:
    type: object
    additionalProperties: false
    patternProperties:
      # TODO: this case repeats because a patternProperties requires a literal
      # regex, but since this is YAML, it could be factored out with anchors
      # and aliases. That's not widely supported in YAML parsers (e.g. GitHub's
      # one for workflows), so this is just a note for the future --arm). Also,
      # the definition should be put in a top-level key (e.g. _defs) that won't
      # be rejected by schema validators nor interfere with the validation.
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-bool"

  # Atomic dynamic string list. A single string is accepted as shorthand
  # for a one-element list (Alire's labeled properties allow this).
  dyn-strlist:
    oneOf:
      - type: string
      - type: array
        items:
          type: string
      - "$ref": "#/$defs/case-of-strlist"
  case-of-strlist:
    type: object
    additionalProperties: false
    patternProperties:
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-strlist"

  # Composite dynamic table: a dependency table. `case(...)` keys are
  # siblings of static `crate = "constraint"` entries; the two
  # patternProperties are disjoint because crate names never contain '('.
  dyn-deps:
    type: object
    additionalProperties: false
    patternProperties:
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-deps"
      '^[a-zA-Z][a-zA-Z0-9_]*$':
        type: string
  deps-or-array:
    oneOf:
      - "$ref": "#/$defs/dyn-deps"
      - type: array
        items:
          "$ref": "#/$defs/dyn-deps"

  # Composite dynamic table mapping arbitrary string names to strings
  # (used by gpr-set-externals). Keys matching `case(...)` are branches;
  # any other key is an external-variable name mapping to a string.
  dyn-string-map:
    type: object
    patternProperties:
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-string-map"
    additionalProperties:
      type: string

  # Environment table: VAR.<action> = value, with optional case branches.
  dyn-environment:
    type: object
    patternProperties:
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-environment"
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        # TODO: those strings are considered path fragments and use portable
        # format, I believe. Verify.
        append:
          type: string
          description: Value to append to the variable.
        prepend:
          type: string
          description: Value to prepend to the variable.
        set:
          type: string
          description: Value to set the variable to.

  # Actions are recursive: a single action table, an array of action nodes
  # (the `[[actions]]` / `[[actions.'case'.x]]` array-of-tables forms), or a
  # `case` wrapper whose branches are again action nodes (possibly arrays).
  action-node:
    oneOf:
      - "$ref": "#/$defs/action-table"
      - type: array
        items:
          "$ref": "#/$defs/action-node"
      - type: object
        additionalProperties: false
        patternProperties:
          '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
            type: object
            propertyNames:
              "$ref": "#/$defs/case-label"
            additionalProperties:
              "$ref": "#/$defs/action-node"
  action-table:
    type: object
    additionalProperties: false
    required: [type, command]
    properties:
      type:
        "$ref": "#/$defs/action-type"
        description: >-
          When the action runs: post-fetch, pre-build, post-build, or the
          deprecated test.
      command:
        type: array
        items:
          type: string
        description: >-
          Shell command to run, as an array of strings, in the source
          directory.
      directory:
        type: string # TODO: a portable path
        description: >-
          Optional portable relative path from the crate root where the action
          runs. Must exist.

  # A test spec: a single runner table, an array of runners (`[[test]]`),
  # or a `case` wrapper whose branches are again test nodes.
  test-node:
    oneOf:
      - "$ref": "#/$defs/test-table"
      - type: array
        items:
          "$ref": "#/$defs/test-node"
      - type: object
        additionalProperties: false
        patternProperties:
          '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
            type: object
            propertyNames:
              "$ref": "#/$defs/case-label"
            additionalProperties:
              "$ref": "#/$defs/test-node"
  test-table:
    type: object
    additionalProperties: false
    properties:
      runner:
        "$ref": "#/$defs/runner"
        description: Built-in test runner name (currently only `alire`).
      command:
        type: array
        items:
          type: string
        description: External command to run as the test, as an array of strings.
      id:
        type: string
        minLength: 1
        description: >-
          Unique, non-empty identifier for this runner, selectable with
          `alr test --id=<id>`.
      directory:
        type: string  # TODO: a portable path
        default: tests
        description: Subfolder of the crate root to enter before running the tests.
      jobs:
        type: integer
        minimum: 1
        description: >-
          Number of tests to run in parallel (built-in runner only).
    oneOf:
      - required: [runner]
      - required: [command]

  # Origin table, possibly wrapped in nested case branches (binary origins).
  dyn-origin:
    type: object
    additionalProperties: false
    patternProperties:
      '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
        type: object
        propertyNames:
          "$ref": "#/$defs/case-label"
        additionalProperties:
          "$ref": "#/$defs/dyn-origin"
    properties:
      url:
        type: string
        description: >-
          URL pointing to a source archive or repository. The prefixes git+,
          hg+ or svn+ make the VCS explicit.
      hashes:
        "$ref": "#/$defs/hash-array"
        description: >-
          Array of `kind:digest` hashes for source archives (e.g. sha512:...).
      archive-name:
        type: string
        description: >-
          Name of the file to download when the URL does not identify the
          source archive, needed for proper extraction.
      commit:
        type: string  # TODO: length is known
        description: >-
          VCS revision (git/hg hash or svn revision) to check out. Mandatory
          for VCS origins.
      subdir:
        type: string  # TODO: a portable path, more precisely (forward slashes)
        description: >-
          Relative path to the crate within the repository, when not at its
          root (e.g., monorepos).
      binary:
        type: boolean
        default: false
        description: >-
          Marks the origin as binary (not compiled). Defaults to false.
          Required when the origin uses dynamic expressions.

  # Pins: version | path | git (url + commit|branch + subdir).
  pin-table:
    type: object
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
          description: Single version to pin the crate to.
        path:
          type: string  # TODO: a portable path
          description: >-
            Absolute or relative path to a local crate directory that fulfills
            the dependency.
        url:
          type: string
          description: URL of a git repository to clone and use as the crate source.
        commit:
          type: string
          description: >-
            Complete git commit hash to fix the checkout (mutually exclusive
            with branch).
        branch:
          type: string
          description: >-
            Branch to track on `alr update` (mutually exclusive with commit).
        subdir:
          type: string  # TODO: a portable path
          description: >-
            Relative path to the crate within the repository, when not at its
            root.
      # A pin is exactly one of: version, path, or git origin (url with
      # an optional commit|branch -- not both -- and subdir).
      oneOf:
        - required: [version]
          properties: {version: true}
          additionalProperties: false
        - required: [path]
          properties: {path: true}
          additionalProperties: false
        - required: [url]
          properties:
            url: true
            commit: true
            branch: true
            subdir: true
          additionalProperties: false
          not:
            required: [commit, branch]

  # External definitions.
  external:
    type: object
    properties:
      kind:
        "$ref": "#/$defs/external-kind"
        description: "External kind: `hint`, `version-output`, or `system`."
      hint:
        "$ref": "#/$defs/dyn-string"
        description: >-
          Explanation shown to the user on how to make the external entity
          available.
      available:
        "$ref": "#/$defs/dyn-bool"
        description: >-
          Restricts external detection to the given environment conditions.
      version-command:
        type: array
        items:
          type: string
        description: >-
          Command invocation that outputs the tool version when available.
      version-regexp:
        type: string
        description: >-
          GNAT.Regpat-compatible regular expression whose parenthesized match
          is parsed as the tool's semantic version.
      provides:
        type: string
        description: Crate name that this external is equivalent to for the solver.
      origin:
        "$ref": "#/$defs/dyn-origin-list"
        description: >-
          List of platform package names that natively supply the dependency
          (for `system` externals).
    allOf:
      - if:
          properties:
            kind:
              const: version-output
          required: [kind]
        then:
          required: [version-command, version-regexp]
      - if:
          properties:
            kind:
              const: system
          required: [kind]
        then:
          required: [origin]

  # A list of system package names, possibly case-dynamic.
  dyn-origin-list:
    oneOf:
      - type: array
        items:
          type: string
      - type: object
        additionalProperties: false
        patternProperties:
          '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
            type: object
            propertyNames:
              "$ref": "#/$defs/case-label"
            additionalProperties:
              "$ref": "#/$defs/dyn-origin-list"

  # Atomic dynamic string (e.g. external hint).
  dyn-string:
    oneOf:
      - type: string
      - type: object
        additionalProperties: false
        patternProperties:
          '^case\((os|distribution|host-arch|toolchain|word-size)\)$':
            type: object
            propertyNames:
              "$ref": "#/$defs/case-label"
            additionalProperties:
              "$ref": "#/$defs/dyn-string"

  # ----- Crate configuration -------------------------------------------
  # Key names are restricted (case-insensitively) to the known flags; the
  # canonical spellings below additionally type-check their values. We could
  # use patterns to catch all spellings but that would be ugly and not much
  # more robust, that's the spelling used overwhelmingly in the index.
  configuration:
    type: object
    propertyNames:
      "$ref": "#/$defs/config-key"
    properties:
      disabled:
        type: boolean
        default: false
        description: Completely disable configuration code generation for the crate.
      output_dir:
        type: string
        default: config
        description: >-
          Directory, relative to the crate root, where the configuration code
          is generated.
      generate_ada:
        type: boolean
        default: true
        description: Enable generation of Ada configuration.
      generate_gpr:
        type: boolean
        default: true
        description: Enable generation of GPR file configuration.
      generate_c:
        type: boolean
        default: true
        description: Enable generation of C configuration.
      auto_gpr_with:
        type: boolean
        default: true
        description: >-
          Enable generation of the list of withed projects in the GPR
          configuration file.
      variables:
        type: object
        additionalProperties:
          "$ref": "#/$defs/config-variable"
        description: >-
          Crate configuration variable definitions, keyed by variable name.
      values:
        type: object
        additionalProperties:
          type: object
          additionalProperties: true
        description: >-
          Values assigned to configuration variables, keyed by crate name.
  config-variable:
    type: object
    additionalProperties: false
    required: [type]
    properties:
      type:
        "$ref": "#/$defs/config-type"
        description: >-
          Type of the configuration variable: String, Boolean, Enum, Integer,
          or Real.
      default:
        # Any type; must be valid for the variable's `type`.
        description: >-
          Default value, used if no crate sets the variable. Must be valid for
          the type.
      first:
        type: number
        description: >-
          Lower bound (inclusive) of valid values. Integer and Real types only.
      last:
        type: number
        description: >-
          Upper bound (inclusive) of valid values. Integer and Real types only.
      values:
        type: array
        items:
          type: string
        description: >-
          All possible values of the enumeration. Mandatory for Enum types.
    allOf:
      - if:
          properties:
            type:
              "$ref": "#/$defs/config-type-enum"
          required: [type]
        then:
          required: [values]

  # ----- Build profiles / switches -------------------------------------
  # Switch category keys are restricted (case-insensitively) to the known
  # categories; each maps to a named selection or a custom switch list.
  build-switch-profile:
    description: >-
      Switch selections for a build profile, keyed by switch category
      (optimization, debug_info, runtime_checks, ...).
    type: object
    propertyNames:
      "$ref": "#/$defs/switch-category"
    additionalProperties:
      "$ref": "#/$defs/switch-value"
  # Each switch category accepts a named selection (string) or a custom
  # list of raw compiler switches.
  switch-value:
    description: >-
      A named switch selection (e.g. "Performance") or a custom list of raw
      compiler switches (e.g. ["-O1", "-gnatn"]).
    oneOf:
      - type: string
      - type: array
        items:
          type: string

  # ----- Case-insensitive token patterns -------------------------------
  # Alire compares enum tokens and these key names case-insensitively.
  # ECMA-262 (JSON Schema) regex has no case-insensitive flag, so each
  # letter is spelled as a [Xx] class. The patterns live here, behind sane
  # names, with the readable alternation in a comment beneath each.
  config-key:
    description: Crate configuration flag/table name, case-insensitive.
    pattern: '^([Dd][Ii][Ss][Aa][Bb][Ll][Ee][Dd]|[Oo][Uu][Tt][Pp][Uu][Tt]_[Dd][Ii][Rr]|[Gg][Ee][Nn][Ee][Rr][Aa][Tt][Ee]_[Aa][Dd][Aa]|[Gg][Ee][Nn][Ee][Rr][Aa][Tt][Ee]_[Gg][Pp][Rr]|[Gg][Ee][Nn][Ee][Rr][Aa][Tt][Ee]_[Cc]|[Aa][Uu][Tt][Oo]_[Gg][Pp][Rr]_[Ww][Ii][Tt][Hh]|[Vv][Aa][Rr][Ii][Aa][Bb][Ll][Ee][Ss]|[Vv][Aa][Ll][Uu][Ee][Ss])$'
    # matches: disabled | output_dir | generate_ada | generate_gpr |
    #          generate_c | auto_gpr_with | variables | values
  config-type:
    description: Configuration variable type, case-insensitive.
    type: string
    pattern: '^([Ss][Tt][Rr][Ii][Nn][Gg]|[Bb][Oo][Oo][Ll][Ee][Aa][Nn]|[Ee][Nn][Uu][Mm]|[Ii][Nn][Tt][Ee][Gg][Ee][Rr]|[Rr][Ee][Aa][Ll])$'
    # matches: string | boolean | enum | integer | real
  config-type-enum:
    description: The Enum configuration variable type, case-insensitive.
    type: string
    pattern: '^[Ee][Nn][Uu][Mm]$'
    # matches: enum
  switch-category:
    description: Build switch category name, case-insensitive.
    pattern: '^([Oo][Pp][Tt][Ii][Mm][Ii][Zz][Aa][Tt][Ii][Oo][Nn]|[Dd][Ee][Bb][Uu][Gg]_[Ii][Nn][Ff][Oo]|[Rr][Uu][Nn][Tt][Ii][Mm][Ee]_[Cc][Hh][Ee][Cc][Kk][Ss]|[Cc][Oo][Mm][Pp][Ii][Ll][Ee]_[Cc][Hh][Ee][Cc][Kk][Ss]|[Cc][Oo][Nn][Tt][Rr][Aa][Cc][Tt][Ss]|[Ss][Tt][Yy][Ll][Ee]_[Cc][Hh][Ee][Cc][Kk][Ss]|[Aa][Dd][Aa]_[Vv][Ee][Rr][Ss][Ii][Oo][Nn]|[Ss][Oo][Uu][Rr][Cc][Ee]_[Ee][Nn][Cc][Oo][Dd][Ii][Nn][Gg])$'
    # matches: optimization | debug_info | runtime_checks |
    #          compile_checks | contracts | style_checks | ada_version |
    #          source_encoding
  build-profile:
    description: Build profile name, case-insensitive.
    type: string
    pattern: '^([Dd][Ee][Vv][Ee][Ll][Oo][Pp][Mm][Ee][Nn][Tt]|[Rr][Ee][Ll][Ee][Aa][Ss][Ee]|[Vv][Aa][Ll][Ii][Dd][Aa][Tt][Ii][Oo][Nn])$'
    # matches: development | release | validation
  profile-or-wildcard:
    description: Build profile name or '*' wildcard, case-insensitive.
    type: string
    pattern: '^(\*|[Dd][Ee][Vv][Ee][Ll][Oo][Pp][Mm][Ee][Nn][Tt]|[Rr][Ee][Ll][Ee][Aa][Ss][Ee]|[Vv][Aa][Ll][Ii][Dd][Aa][Tt][Ii][Oo][Nn])$'
    # matches: * | development | release | validation
  action-type:
    description: Action trigger kind, case-insensitive.
    type: string
    pattern: '^([Pp][Oo][Ss][Tt]-[Ff][Ee][Tt][Cc][Hh]|[Pp][Rr][Ee]-[Bb][Uu][Ii][Ll][Dd]|[Pp][Oo][Ss][Tt]-[Bb][Uu][Ii][Ll][Dd]|[Tt][Ee][Ss][Tt])$'
    # matches: post-fetch | pre-build | post-build | test
  external-kind:
    description: External definition kind, case-insensitive.
    type: string
    pattern: '^([Hh][Ii][Nn][Tt]|[Vv][Ee][Rr][Ss][Ii][Oo][Nn]-[Oo][Uu][Tt][Pp][Uu][Tt]|[Ss][Yy][Ss][Tt][Ee][Mm])$'
    # matches: hint | version-output | system
  runner:
    description: Built-in test runner name, case-insensitive.
    type: string
    pattern: '^([Aa][Ll][Ii][Rr][Ee])$'
    # matches: alire

  # ----- Shared leaf types ---------------------------------------------
  crate-name:
    description: >-
      Crate identifier: 3 to 64 characters, lowercase latin alphanumerics
      and underscores, not starting with an underscore. See
      `alr help identifiers`. (Ada/GPR keyword exclusion is not checked.)
    type: string
    pattern: '^[a-z0-9][a-z0-9_]{2,63}$'
  string-array:
    type: array
    items:
      type: string
  hash-array:
    type: array
    items:
      type: string
      pattern: '^(sha512|sha256):[0-9a-fA-F]+$'
